{% extends 'wallet/base.html' %}

{% block title %}Login — Alke Wallet{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">

                <div class="text-center mb-4">
                    <i class="bi bi-wallet2 fs-1 text-dark"></i>
                    <h4 class="fw-bold mt-2">Iniciar sesión</h4>
                    <p class="text-muted">Alke Financial</p>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Usuario</label>
                        <input type="text" name="username" class="form-control form-control-lg"
                            placeholder="Tu nombre de usuario" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <input type="password" name="password" class="form-control form-control-lg"
                            placeholder="Tu contraseña" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> Ingresar
                        </button>
                    </div>
                </form>

                <hr>
                <p class="text-center text-muted mb-0">
                    ¿No tienes cuenta? <a href="{% url 'register' %}" class="text-dark fw-semibold">Regístrate</a>
                </p>

            </div>
        </div>
    </div>
</div>
{% endblock %}
